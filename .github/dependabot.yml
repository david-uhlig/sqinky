# Configure dependabot alerts and version updates
# For supported ecosystems, see https://docs.github.com/en/code-security/dependabot/ecosystems-supported-by-dependabot/supported-ecosystems-and-repositories
version: 2
updates:
  - package-ecosystem: github-actions # See documentation for possible values
    directory: "/" # Location of package manifests
    groups:
      github-actions:
        patterns:
          - "*"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: bundler
    directory: "/"
    groups:
      bundler:
        patterns:
          - "*"
    schedule:
      interval: weekly
    cooldown:
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2
      default-days: 7
